{% extends "base.html" %}

{% block content %}
<div class="auth-form">
    <h2>用户登录</h2>
    <form method="post">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">登录</button>
    </form>
    <p>还没有账号？<a href="{{ url_for('register') }}">立即注册</a></p>
</div>
{% endblock %}
